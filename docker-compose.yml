services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      target: migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    profiles:
      - migrate
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 6001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      UPLOADS_DIR: /var/www/uploads
      PUBLIC_UPLOADS_PREFIX: /uploads
      HMAC_CLICK_SECRET: ${HMAC_CLICK_SECRET}
    volumes:
      - uploads:/var/www/uploads
    expose:
      - '6001'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Inlined into the client JS bundle at build time; controls how the
        # browser builds absolute URLs for media assets returned by the API.
        NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 6000
      API_URL: http://api:6001
      NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    expose:
      - '6000'

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/var/www/uploads:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  pg_data:
  redis_data:
  uploads:
