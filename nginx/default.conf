upstream web_upstream {
  server web:3000;
  keepalive 32;
}

upstream api_upstream {
  server api:4000;
  keepalive 32;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 50M;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/rss+xml;

  # Static uploads — served directly by nginx for performance
  location /uploads/ {
    alias /var/www/uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # API
  location /api/ {
    proxy_pass http://api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Next.js static assets
  location /_next/static/ {
    proxy_pass http://web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Everything else → Next.js (SSR/ISR)
  location / {
    proxy_pass http://web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}

# When TLS is configured, uncomment and adapt:
# server {
#   listen 443 ssl http2;
#   server_name your-domain.com;
#   ssl_certificate /etc/nginx/certs/fullchain.pem;
#   ssl_certificate_key /etc/nginx/certs/privkey.pem;
#   ssl_protocols TLSv1.2 TLSv1.3;
#   include /etc/nginx/conf.d/_proxy_locations.conf;  # if you split common locations
# }
